<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRAB — новый дизайн дашборда</title>
<style>
/* ============ TOKENS ============ */
:root{
  --brand:#FD212C; /* фиксированный фирменный красный, не меняется темой */
  --accent:#FD212C; --accent-hover:#DE1520; --accent-soft:rgba(253,33,44,.08);
  --bg:#F5F6F8; --surface:#FFFFFF; --surface-2:#FAFBFC; --border:#E5E8EE; --border-strong:#D5DAE3;
  --text:#1B2330; --text-2:#5B6675; --text-3:#8B95A5;
  --t3-bg:#DDF1FD; --t3-fg:#0B6E99; --t3-heat:#3BAFDA;
  --t10-bg:#DCF4E4; --t10-fg:#177245; --t10-heat:#3CB878;
  --t20-bg:#FBF0C9; --t20-fg:#8F6E0A; --t20-heat:#E7C544;
  --t50-bg:#FDE3E0; --t50-fg:#B3352B; --t50-heat:#EE7B6E;
  --t100-bg:#ECEFF3; --t100-fg:#6B7686; --t100-heat:#AEB7C4;
  --up:#178A4C; --down:#C93A2E;
  --typ-green:#34C48E; --typ-pink:#F0719B; --typ-purple:#9B7DE8; --typ-gray:#9AA3AF;
  --shadow:0 1px 2px rgba(20,30,50,.05);
  --shadow-lg:0 8px 30px rgba(20,30,50,.12);
  --radius:8px;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0F1319; --surface:#161B23; --surface-2:#1B212B; --border:#262E3A; --border-strong:#333D4C;
    --text:#E7EBF2; --text-2:#98A2B3; --text-3:#68738A;
    --accent-soft:rgba(253,33,44,.14);
    --t3-bg:rgba(59,175,218,.16); --t3-fg:#6CC8EC; --t3-heat:#2D7FA0;
    --t10-bg:rgba(60,184,120,.16); --t10-fg:#63D398; --t10-heat:#2C8A57;
    --t20-bg:rgba(231,197,68,.14); --t20-fg:#E3C558; --t20-heat:#9A812C;
    --t50-bg:rgba(238,123,110,.15); --t50-fg:#F09287; --t50-heat:#A4453B;
    --t100-bg:rgba(174,183,196,.10); --t100-fg:#8B95A5; --t100-heat:#4A5462;
    --up:#4CC581; --down:#F08B80;
    --shadow:0 1px 2px rgba(0,0,0,.3);
    --shadow-lg:0 10px 34px rgba(0,0,0,.5);
  }
}
:root[data-theme="light"]{
  --accent:#FD212C; --accent-hover:#DE1520; --accent-soft:rgba(253,33,44,.08);
  --bg:#F5F6F8; --surface:#FFFFFF; --surface-2:#FAFBFC; --border:#E5E8EE; --border-strong:#D5DAE3;
  --text:#1B2330; --text-2:#5B6675; --text-3:#8B95A5;
  --t3-bg:#DDF1FD; --t3-fg:#0B6E99; --t3-heat:#3BAFDA;
  --t10-bg:#DCF4E4; --t10-fg:#177245; --t10-heat:#3CB878;
  --t20-bg:#FBF0C9; --t20-fg:#8F6E0A; --t20-heat:#E7C544;
  --t50-bg:#FDE3E0; --t50-fg:#B3352B; --t50-heat:#EE7B6E;
  --t100-bg:#ECEFF3; --t100-fg:#6B7686; --t100-heat:#AEB7C4;
  --up:#178A4C; --down:#C93A2E;
  --shadow:0 1px 2px rgba(20,30,50,.05);
  --shadow-lg:0 8px 30px rgba(20,30,50,.12);
}
:root[data-theme="dark"]{
  --bg:#0F1319; --surface:#161B23; --surface-2:#1B212B; --border:#262E3A; --border-strong:#333D4C;
  --text:#E7EBF2; --text-2:#98A2B3; --text-3:#68738A;
  --accent-soft:rgba(253,33,44,.14);
  --t3-bg:rgba(59,175,218,.16); --t3-fg:#6CC8EC; --t3-heat:#2D7FA0;
  --t10-bg:rgba(60,184,120,.16); --t10-fg:#63D398; --t10-heat:#2C8A57;
  --t20-bg:rgba(231,197,68,.14); --t20-fg:#E3C558; --t20-heat:#9A812C;
  --t50-bg:rgba(238,123,110,.15); --t50-fg:#F09287; --t50-heat:#A4453B;
  --t100-bg:rgba(174,183,196,.10); --t100-fg:#8B95A5; --t100-heat:#4A5462;
  --up:#4CC581; --down:#F08B80;
  --shadow:0 1px 2px rgba(0,0,0,.3);
  --shadow-lg:0 10px 34px rgba(0,0,0,.5);
}

/* ============ BASE ============ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13.5px;line-height:1.45}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:inherit;text-decoration:none}
input,select{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

#app{min-height:100vh}

/* ============ TOPBAR ============ */
.topbar{display:flex;align-items:center;gap:16px;height:52px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.06em;font-size:14px}
.logo .mark{width:30px;height:30px;border-radius:7px;background:var(--brand);display:flex;align-items:center;justify-content:center;flex:none}
.logo .mark svg{width:22px;height:22px;display:block}
.crumbs{display:flex;align-items:center;gap:6px;color:var(--text-3);font-size:12.5px;white-space:nowrap;overflow:hidden}
.crumbs a:hover{color:var(--text)}
.crumbs .sep{opacity:.5}
.crumbs .cur{color:var(--text-2);font-weight:600}
.topbar .spacer{flex:1}
.gsearch{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:300px;color:var(--text-3);font-size:12.5px}
.gsearch svg{flex:none}
.gsearch .kbd{margin-left:auto;font-family:var(--mono);font-size:10.5px;border:1px solid var(--border-strong);border-radius:4px;padding:1px 5px;color:var(--text-3)}
/* живой поиск с панелью «Все / Избранное» */
.search-wrap{position:relative}
.gsearch input{border:none;background:transparent;outline:none;color:var(--text);width:210px;font-size:12.5px}
.gsearch input::placeholder{color:var(--text-3)}
.chrome-darkframe .gsearch input{color:#EDF1F7}
.gs-panel{position:absolute;top:calc(100% + 8px);left:0;width:390px;max-height:430px;display:none;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:80;overflow:hidden}
.search-wrap.open .gs-panel{display:flex}
.gs-tabs{display:flex;border-bottom:1px solid var(--border);flex:none}
.gs-tab{flex:1;padding:10px;font-size:12.5px;font-weight:650;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px}
.gs-tab:hover{color:var(--text)}
.gs-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.gs-list{overflow-y:auto}
.gs-item{display:flex;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border);align-items:flex-start;cursor:pointer}
.gs-item:last-child{border-bottom:none}
.gs-item:hover{background:var(--bg)}
.gs-item .eng{width:16px;height:16px;flex:none;border-radius:4px;font-size:9.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-top:2px}
.gs-body{flex:1;min-width:0}
.gs-t{font-size:12.5px;color:var(--text)}
.gs-t b{font-weight:700}
.gs-sep{color:var(--text-3);margin:0 5px}
.gs-d{font-size:10.5px;color:var(--text-3);margin-top:2px;display:flex;gap:4px;align-items:center}
.gs-star{color:var(--text-3);font-size:15px;flex:none;padding:0 2px;line-height:1}
.gs-star:hover,.gs-star.on{color:#E8B93B}
.gs-empty{padding:16px;text-align:center;color:var(--text-3);font-size:12px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3D5AFE,#00B0FF);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
/* меню профиля по наведению */
.ava-wrap{position:relative;display:inline-flex;align-items:center;gap:4px;cursor:pointer;padding:4px 0}
.ava-car{color:var(--text-3);font-size:8px}
.chrome-darkframe .ava-car{color:#7B8698}
.ava-menu{position:absolute;top:100%;right:0;min-width:215px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);padding:6px;display:none;z-index:110}
.ava-wrap:hover .ava-menu,.ava-wrap:focus-within .ava-menu{display:block}
.am-item{display:block;width:100%;padding:8px 11px;border-radius:6px;font-size:12.5px;font-weight:550;color:var(--text-2);text-align:left}
.am-item:hover{background:var(--bg);color:var(--text)}
.am-sep{height:1px;background:var(--border);margin:5px 4px}

/* переключатель темы в шапке: системная / светлая / тёмная */
.theme-seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:2px;gap:1px}
.ts-btn{width:27px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;color:var(--text-3)}
.ts-btn:hover{color:var(--text)}
.ts-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.ts-btn svg{width:14px;height:14px}

/* ============ SHELL / SIDENAV ============ */
.shell{display:flex}
.sidenav{width:64px;flex:none;padding:14px 8px;display:flex;flex-direction:column;gap:4px;position:sticky;top:52px;height:calc(100vh - 52px);z-index:30} /* выше липких строк таблицы — flyout не перекрывается */
.sidenav .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-radius:8px;color:var(--text-2);font-size:10px;font-weight:600}
.sidenav .nav-item svg{width:19px;height:19px}
.sidenav .nav-item:hover{background:var(--surface);color:var(--text)}
.sidenav .nav-item.active{background:var(--accent-soft);color:var(--accent)}
.main{flex:1;min-width:0;padding:18px 22px 40px 10px}

/* ============ PAGE HEAD ============ */
.page-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.ph-left{display:flex;flex-direction:column;gap:6px;min-width:0}
.ph-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ph-title h1{font-size:19px;font-weight:750;letter-spacing:-.01em}
.star{color:var(--text-3);font-size:16px}
.star:hover{color:#E8B93B}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;border-radius:20px;padding:3px 9px;line-height:1.2}
.badge.engine{background:var(--t50-bg);color:var(--t50-fg)}
.badge.engine svg{width:10px;height:11px;flex:none}
.badge.engine.g{background:var(--t3-bg);color:var(--t3-fg)}
.badge.status{background:var(--t10-bg);color:var(--t10-fg)}
.badge.sched{background:var(--surface);border:1px solid var(--border);color:var(--text-2)}
.badge.region{background:var(--surface);border:1px solid var(--border);color:var(--text-2)}
.ph-meta{color:var(--text-3);font-size:12px}
/* тихий ряд статус-иконок у заголовка: без плашек и подписей, расшифровка в тултипах */
.ph-states{display:inline-flex;align-items:center;gap:9px;margin-left:4px}
.state-ico{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;color:var(--text-3);cursor:default;opacity:.85}
.state-ico:hover{color:var(--text-2);opacity:1}
.state-ico svg{width:13px;height:14px}
.state-ico.flag{font-size:12.5px}
.state-ico.dot::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--t10-heat)}
/* мгновенные тултипы для иконок */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);font-size:10.5px;font-weight:600;padding:4.5px 9px;border-radius:6px;white-space:nowrap;z-index:120;pointer-events:none;box-shadow:var(--shadow-lg)}
.ph-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--radius);padding:8px 14px;font-size:12.5px;font-weight:650;border:1px solid transparent;transition:background .12s}
.btn.primary{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
.btn.primary:hover{background:var(--accent-hover)}
.btn.secondary{background:var(--surface);border-color:var(--border);color:var(--text-2)}
.btn.secondary:hover{border-color:var(--border-strong);color:var(--text)}
.btn.icon{padding:8px 9px}

/* ============ TOOLBAR ============ */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
.counters{display:flex;align-items:center;gap:14px;padding-right:14px;border-right:1px solid var(--border)}
.counter{display:flex;align-items:baseline;gap:6px;font-size:12px;color:var(--text-3)}
.counter b{font-size:14px;color:var(--text);font-variant-numeric:tabular-nums}
.f-input{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12.5px;color:var(--text-3)}
.f-input input{border:none;background:none;outline:none;width:130px;color:var(--text)}
.f-select{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12.5px;color:var(--text-2);white-space:nowrap}
.f-select b{color:var(--text);font-weight:650}
.f-select .car{color:var(--text-3);font-size:9px}
.hsw{display:inline-block;width:9px;height:9px;border-radius:2px;margin:0 2px 0 3px;vertical-align:-1px}
.toolbar .spacer{flex:1}
.period{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums}

/* ============ LEGEND ============ */
.legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:0 2px 12px;font-size:11.5px;color:var(--text-3)}
.legend .lg-group{display:flex;align-items:center;gap:8px}
.lg-chip{display:inline-flex;align-items:center;gap:5px;color:var(--text-2)}
.lg-chip .sw{width:14px;height:14px;border-radius:4px}
.lg-chip .dotsw{width:9px;height:9px;border-radius:50%}
.legend .lg-label{font-weight:650;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;font-size:10px}

/* ============ SUMMARY: TABLE ============ */
.summary-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow)}
.summary-table table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.summary-table th,.summary-table td{padding:7px 12px;font-size:12.5px;text-align:right;border-bottom:1px solid var(--border)}
.summary-table tr:last-child th,.summary-table tr:last-child td{border-bottom:none}
.summary-table th{text-align:left;font-weight:600;color:var(--text-2);width:220px}
.summary-table tr.hero th,.summary-table tr.hero td{background:var(--surface-2);font-weight:700;color:var(--text)}
.summary-table .num{font-weight:650}
.summary-table .pct{color:var(--text-3);font-size:11px;margin-left:5px}
.summary-table td.lastcol{background:var(--accent-soft)}
.sum-delta{font-size:10.5px;font-weight:700;margin-left:4px}
.sum-delta.up{color:var(--up)}.sum-delta.down{color:var(--down)}

/* ============ SUMMARY: STRIP ============ */
.summary-strip{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow-x:auto;box-shadow:var(--shadow)}
.strip-item{flex:1;min-width:128px;padding:12px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.strip-item:last-child{border-right:none}
.strip-item .lbl{font-size:10.5px;font-weight:650;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3)}
.strip-item .val{font-size:19px;font-weight:750;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:6px}
.strip-item .val .pct{font-size:11.5px;color:var(--text-3);font-weight:600}
.strip-item .trend{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:650}
.strip-item .trend.up{color:var(--up)}.strip-item .trend.down{color:var(--down)}
.strip-item svg{margin-top:2px}

/* ============ SUMMARY: CARDS ============ */
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:10px;margin-bottom:16px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:4px}
.sum-card .lbl{font-size:10.5px;font-weight:650;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);display:flex;align-items:center;gap:6px}
.sum-card .lbl .sw{width:8px;height:8px;border-radius:2px}
.sum-card .val{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:7px}
.sum-card .val .pct{font-size:12px;color:var(--text-3);font-weight:600}
.sum-card .trend{font-size:11.5px;font-weight:650;display:flex;gap:5px;align-items:center}
.sum-card .trend.up{color:var(--up)}.sum-card .trend.down{color:var(--down)}
.sum-card .spark{margin-top:4px}

/* ============ SUMMARY: CHART ============ */
.summary-chart{display:grid;grid-template-columns:minmax(0,1fr) 232px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.chart-pane{padding:14px 16px 6px;min-width:0}
.chart-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:650;margin-bottom:2px}
.chart-pane svg{width:100%;height:auto;display:block}
.chart-side{border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center}
.cs-item{display:flex;align-items:center;gap:8px;padding:7.5px 14px;border-bottom:1px solid var(--border);font-size:12px}
.cs-item:last-child{border-bottom:none}
.cs-item .sw{width:8px;height:8px;border-radius:2px;flex:none}
.cs-item .lbl{flex:1;color:var(--text-2)}
.cs-item .val{font-weight:700;font-variant-numeric:tabular-nums}
.cs-item .dd{font-size:10.5px;font-weight:700;min-width:34px;text-align:right}
.cs-item .dd.up{color:var(--up)}.cs-item .dd.down{color:var(--down)}.cs-item .dd.flat{color:var(--text-3)}

/* ============ NOW COLUMN (вариант «Динамика») ============ */
.grid thead th.now,.grid td.now{border-right:1px solid var(--border-strong)}
.grid td.now{white-space:nowrap;text-align:right;min-width:160px;padding-right:12px}
.now-cell{display:inline-flex;align-items:center;gap:8px}
.now-cell .np{font-size:15px;font-weight:750;font-family:var(--mono)}
.nd{font-size:10px;font-weight:750;border-radius:5px;padding:1.5px 5px}
.nd.up{background:var(--t10-bg);color:var(--up)}
.nd.down{background:var(--t50-bg);color:var(--down)}
.nd.flat{color:var(--text-3)}
.has-now .grid td.pos.last{background:transparent}
.has-now .grid thead th.date.last .d{color:var(--text)}
.has-now .grid thead th.date.last{color:var(--text-3)}

/* ============ WORKSHEET ============ */
.worksheet{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:clip}
.table-wrap{overflow-x:auto}
@media (min-width:1200px){.table-wrap:not(.h-scroll){overflow-x:visible}} /* без scroll-контейнера работают sticky-шапки */
#app{--thead-h:34px}
.dens-compact{--thead-h:30px}
.dens-ultra{--thead-h:30px}
table.grid{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.grid thead th{position:sticky;top:52px;z-index:10;background:var(--surface);font-size:11px;font-weight:650;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;padding:9px 8px;border-bottom:1px solid var(--border-strong);text-align:center;white-space:nowrap}
.grid thead th.kw{text-align:left;padding-left:14px;min-width:240px}
.grid thead th.date .d{color:var(--text);font-size:11.5px}
.grid thead th.date .dw{font-weight:500;color:var(--text-3);margin-left:3px;text-transform:none}
.grid thead th.date.last{color:var(--accent)}
.grid thead th.date.last .d{color:var(--accent)}
.grid td{padding:0 8px;height:var(--row-h,38px);border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle}
.grid tr.kw-row:hover td{background:var(--surface-2)}
.grid td.kw{padding-left:36px;max-width:340px}
.kw-cell{display:flex;align-items:center;gap:8px;min-width:0}
.kw-cell .eng{flex:none;width:16px;height:16px;border-radius:4px;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.eng.ya{background:transparent}
.eng.ya svg{width:12px;height:13px;display:block}
.eng.go{background:var(--t3-bg);color:var(--t3-fg)}
.kw-cell .txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;cursor:copy}
.kw-cell .eng{cursor:pointer}
/* копирование ключа: иконка появляется на hover строки, клик по тексту или иконке */
.kw-copy{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:5px;color:var(--text-3);flex:none;opacity:0;transition:opacity .12s,color .12s}
tr.kw-row:hover .kw-copy,.kw-copy:focus-visible{opacity:1}
.kw-copy:hover{color:var(--text);background:var(--border)}
.kw-copy.copied{opacity:1;color:var(--up)}
.grid td.typ{white-space:nowrap;text-align:left;min-width:86px}
.typ-dot{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;color:#fff;font-size:9.5px;font-weight:750;margin-right:3px;vertical-align:middle}
.grid td.serp{white-space:nowrap;text-align:center;min-width:60px}
.serp-ico{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:var(--bg);border:1px solid var(--border);color:var(--text-2);margin:0 1px;font-size:9px;font-weight:700}
.grid td.freq{text-align:right;min-width:86px;white-space:nowrap}
.freq-b{font-family:var(--mono);font-size:11px;color:var(--text-2)}
/* динамика частотности к прошлому месяцу — «степенью», как дельта в ячейках позиций;
   крупные значения сокращаются (1,2k), полное число — в тултипе */
.freq-d{font-family:var(--mono);font-size:9px;font-weight:750;line-height:1;vertical-align:5px;margin-left:2px;letter-spacing:-.02em}
.freq-d.up{color:var(--up)}.freq-d.down{color:var(--down)}
.freq-e{font-family:var(--mono);font-size:10.5px;color:var(--text-3);margin-left:6px}
.freq-e::before{content:"!";color:var(--t50-fg);font-weight:700}
.grid td.pos{text-align:center;padding:0 3px;min-width:64px}
.grid td.pos.last{background:var(--t100-bg)} /* последний срез: нейтральное выделение */

/* supergroup row */
.grid tr.super-row td{background:var(--bg);height:52px;padding:0 14px;border-bottom:none}
.super-head{display:flex;align-items:center;gap:10px;white-space:nowrap;cursor:pointer}
.super-head .sname{font-size:16px;font-weight:800;letter-spacing:-.01em}
.super-head .scount{font-size:11.5px;color:var(--text-3);font-variant-numeric:tabular-nums}
.super-row.collapsed .chev{transform:rotate(-90deg)}

/* gaps между блоками */
.grid tr.group-gap td{height:10px;padding:0;border-bottom:none;background:var(--bg)}
.grid tr.group-gap.big td{height:22px}

/* group row — целостный блок: липкая шапка + акцентная кромка */
.grid tr.group-row td{background:var(--surface-2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);height:42px;padding:0 14px 0 24px;box-shadow:inset 3px 0 0 var(--accent);position:sticky;top:calc(52px + var(--thead-h));z-index:5}
.grid tr.kw-row td.kw{box-shadow:inset 3px 0 0 var(--border)}
.gcount-abs{position:absolute;right:14px;top:50%;transform:translateY(-50%)}
.gurl-t[contenteditable="true"]{outline:none;border-bottom:1px dashed var(--accent)}
.rel-url{display:block;font-size:10.5px;color:var(--t20-fg);margin:1px 0 3px 24px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:550}
.rel-url:hover{text-decoration:underline}
.group-head{display:flex;align-items:center;gap:10px;white-space:nowrap}
.group-head .chev{color:var(--text-3);font-size:10px;transition:transform .15s;display:inline-block}
.group-row.collapsed .chev{transform:rotate(-90deg)}
.group-head .gname{font-weight:750;font-size:14.5px}
.group-head .gcount{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}
.group-head .gurl{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--t3-fg);background:var(--t3-bg);border-radius:6px;padding:2.5px 9px;font-weight:550;max-width:340px;overflow:hidden;text-overflow:ellipsis}
.group-head .gurl:hover{text-decoration:underline}
.group-head .gspacer{flex:1}
.group-head .gact{color:var(--text-3);padding:3px 6px;border-radius:5px;font-size:12px}
.group-head .gact:hover{background:var(--border);color:var(--text)}
tr.g-hide,tr.s-hide,tr.v-hide{display:none}

/* ============ POSITION CELL VARIANTS ============ */
.cell{display:inline-flex;align-items:center;justify-content:center;gap:4px;font-weight:650;cursor:pointer;position:relative}
.cell .d{font-size:9.5px;font-weight:700;line-height:1;align-self:flex-start;margin-top:3px} /* дельта как «степень» — прижата к верху */
.cell .d.up{color:var(--up)}.cell .d.down{color:var(--down)}
.cell.none{color:var(--text-3);font-weight:400;cursor:default}
.cell.na{color:var(--text-3);font-weight:500;font-size:10.5px;border:1px dashed var(--border-strong);border-radius:5px;padding:2px 7px;cursor:default}
.swap{position:absolute;top:-5px;left:-6px;width:13px;height:13px;border-radius:50%;background:var(--surface);border:1px solid var(--border-strong);color:var(--text-2);font-size:8px;line-height:1;display:flex;align-items:center;justify-content:center;z-index:2}
.cells-fill .swap,.cells-heat .swap{top:2px;left:3px;background:transparent;border:none}
.cells-heat .swap{color:rgba(255,255,255,.9)}
.swapsw{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--surface);border:1px solid var(--border-strong);color:var(--text-2);font-size:8px}

/* fill — заливка всей ячейки */
.cells-fill td.pos{padding:0}
.cells-fill .cell{width:100%;height:100%;border-radius:0}
.cells-fill .cell.t3{background:var(--t3-bg);color:var(--t3-fg)}
.cells-fill .cell.t10{background:var(--t10-bg);color:var(--t10-fg)}
.cells-fill .cell.t20{background:var(--t20-bg);color:var(--t20-fg)}
.cells-fill .cell.t50{background:var(--t50-bg);color:var(--t50-fg)}
.cells-fill .cell.t100{background:var(--t100-bg);color:var(--t100-fg)}
.cells-fill .cell:not(.none):not(.na):hover{filter:brightness(.96)}

/* chip — компактный чип */
.cells-chip .cell{min-width:40px;padding:3px 7px;border-radius:6px;font-family:var(--mono);font-size:12px}
.cells-chip .cell.t3{background:var(--t3-bg);color:var(--t3-fg)}
.cells-chip .cell.t10{background:var(--t10-bg);color:var(--t10-fg)}
.cells-chip .cell.t20{background:var(--t20-bg);color:var(--t20-fg)}
.cells-chip .cell.t50{background:var(--t50-bg);color:var(--t50-fg)}
.cells-chip .cell.t100{background:var(--t100-bg);color:var(--t100-fg)}
.cells-chip .cell:not(.none):not(.na):hover{box-shadow:0 0 0 1.5px currentColor inset}

/* text — только цифры + индикатор */
.cells-text .cell{font-family:var(--mono);font-size:12.5px;flex-direction:column;gap:1px;padding:2px 0}
.cells-text .cell::after{content:"";width:18px;height:3px;border-radius:2px;margin-top:2px}
.cells-text .cell.t3{color:var(--t3-fg)}.cells-text .cell.t3::after{background:var(--t3-heat)}
.cells-text .cell.t10{color:var(--t10-fg)}.cells-text .cell.t10::after{background:var(--t10-heat)}
.cells-text .cell.t20{color:var(--t20-fg)}.cells-text .cell.t20::after{background:var(--t20-heat)}
.cells-text .cell.t50{color:var(--t50-fg)}.cells-text .cell.t50::after{background:var(--t50-heat)}
.cells-text .cell.t100{color:var(--t100-fg)}.cells-text .cell.t100::after{background:var(--t100-heat)}
.cells-text .cell.none::after,.cells-text .cell.na::after{display:none}
.cells-text .cell .d{position:absolute;top:-1px;right:-16px}

/* heat — насыщенная тепловая карта */
.cells-heat td.pos{padding:0}
.cells-heat .cell{width:100%;height:100%;border-radius:0;color:#fff;font-family:var(--mono);font-size:12px;text-shadow:0 1px 1px rgba(0,0,0,.18)}
.cells-heat .cell .d{color:rgba(255,255,255,.85)}
.cells-heat .cell.t3{background:var(--t3-heat)}
.cells-heat .cell.t10{background:var(--t10-heat)}
.cells-heat .cell.t20{background:var(--t20-heat)}
.cells-heat .cell.t50{background:var(--t50-heat)}
.cells-heat .cell.t100{background:var(--t100-heat)}
.cells-heat .cell.none,.cells-heat .cell.na{color:var(--text-3);text-shadow:none}
.cells-heat .cell:not(.none):not(.na):hover{filter:brightness(1.08)}

/* pill — мягкие пилюли */
.cells-pill .cell{min-width:46px;padding:4px 10px;border-radius:20px;font-size:12px}
.cells-pill .cell.t3{background:var(--t3-bg);color:var(--t3-fg);border:1px solid color-mix(in srgb,var(--t3-fg) 25%,transparent)}
.cells-pill .cell.t10{background:var(--t10-bg);color:var(--t10-fg);border:1px solid color-mix(in srgb,var(--t10-fg) 25%,transparent)}
.cells-pill .cell.t20{background:var(--t20-bg);color:var(--t20-fg);border:1px solid color-mix(in srgb,var(--t20-fg) 25%,transparent)}
.cells-pill .cell.t50{background:var(--t50-bg);color:var(--t50-fg);border:1px solid color-mix(in srgb,var(--t50-fg) 25%,transparent)}
.cells-pill .cell.t100{background:var(--t100-bg);color:var(--t100-fg);border:1px solid color-mix(in srgb,var(--t100-fg) 25%,transparent)}

/* ============ DENSITY ============ */
.dens-compact{--row-h:30px;font-size:12.5px}
.dens-compact .grid td{font-size:12px}
.dens-compact .grid thead th{padding:7px 6px}
.dens-ultra{--row-h:26px}
.dens-ultra .grid td{font-size:11.5px;border-bottom:none}
.dens-ultra .grid td.kw{padding-left:12px}
.dens-ultra .grid tr.group-row td{height:34px}
.dens-relaxed{--row-h:44px}

/* ============ VARIANT FLAVORS ============ */
.v2{font-size:12.8px}
.v2 .toolbar,.v2 .worksheet,.v2 .summary-table{border-radius:6px}
.v2 .btn{border-radius:6px;padding:7px 12px}
.v2 .summary-table th,.v2 .summary-table td{padding:5px 10px;font-size:11.5px}
.v2 .summary-table .num{font-family:var(--mono);font-size:11.5px}
.v3 .worksheet,.v3 .toolbar,.v3 .summary-table{border-radius:12px}
.v3 .btn{border-radius:9px}
.v3 .summary-table th,.v3 .summary-table td{padding:9px 14px}
.v5 .topbar{background:var(--bg)} /* рама-минимал: шапка сливается с фоном */
.v5 .worksheet,.v5 .toolbar,.v5 .summary-table{border:none;box-shadow:none;background:transparent;border-radius:0}
.v5 .toolbar{padding:6px 2px;border-bottom:1px solid var(--border)}
.v5 .summary-table th{padding-left:2px}
.v5 .summary-table tr.hero th,.v5 .summary-table tr.hero td{background:transparent;border-bottom:2px solid var(--text)}
.v5 .summary-table td.lastcol{background:transparent;font-weight:700}
.v5 .grid thead th{background:var(--bg)}
.v5 .grid td{border-bottom:1px solid var(--border)}
.v5 .grid tr.group-row td{background:var(--bg);border-bottom:2px solid var(--text);border-top:none;height:46px;padding-left:2px;box-shadow:none}
.v5 .grid tr.kw-row td.kw{box-shadow:none}
.v5 .grid tr.super-row td{background:var(--bg);border-bottom:none;padding-left:2px;height:54px}
.v5 .super-head .sname{font-size:17px}
.v5 .grid tr.group-gap td{background:var(--bg)}
.v5 .grid td.kw{padding-left:2px}
.v5 .grid thead th.kw{padding-left:2px}
.v5 .kw-cell .txt{font-weight:550}
.v5 .group-head .gname{font-size:14.5px}
.v5 .group-head .gurl{background:transparent;padding-left:0;color:var(--text-2);text-decoration:underline;text-decoration-color:var(--border-strong)}
.v6 .worksheet,.v6 .summary-table{border-radius:4px}
.v6 .grid thead th.date{font-family:var(--mono)}
.v6 .summary-table th,.v6 .summary-table td{padding:4px 10px;font-size:11.5px}
.v6 .summary-table .num{font-family:var(--mono);font-size:11.5px}
.v8 .worksheet,.v8 .toolbar{border-radius:16px}
.v8 .summary-table{border-radius:16px;border:none;box-shadow:var(--shadow-lg)}
.v8 .summary-table th,.v8 .summary-table td{padding:9px 14px}
.v8 .btn{border-radius:20px}
.v8 .f-input,.v8 .f-select,.v8 .period{border-radius:20px}
.v8 .toolbar{box-shadow:var(--shadow-lg);border:none}
.v8 .gsearch{border-radius:20px}
.v8 .topbar{border-bottom:none;box-shadow:var(--shadow)} /* мягкая рама: тень вместо линии */

/* ============ MOBBIN-BASED VARIANTS (v9–v14) ============ */
/* новые примитивы */
.typ-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;border-radius:5px;padding:2px 6px;margin-right:3px;white-space:nowrap}
.typ-stack{display:inline-flex;align-items:center}
.ts-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--surface);margin-left:-4px}
.ts-dot:first-child{margin-left:0}
.ts-n{font-size:10.5px;color:var(--text-3);margin-left:5px;font-weight:650}
.serp-chip{display:inline-block;font-size:10px;font-weight:650;color:var(--text-2);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1.5px 7px;margin:0 2px;white-space:nowrap}

/* cells 'dot' — число с точкой-индикатором */
.cells-dot .cell{font-family:var(--mono);font-size:12.5px;gap:6px}
.cells-dot .cell::before{content:"";width:7px;height:7px;border-radius:50%;flex:none}
.cells-dot .cell.t3::before{background:var(--t3-heat)}
.cells-dot .cell.t10::before{background:var(--t10-heat)}
.cells-dot .cell.t20::before{background:var(--t20-heat)}
.cells-dot .cell.t50::before{background:var(--t50-heat)}
.cells-dot .cell.t100::before{background:var(--t100-heat)}
.cells-dot .cell.none::before,.cells-dot .cell.na::before{display:none}
.cells-dot .cell .d{font-size:9px}

/* viewbar (Attio) */
.viewbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.vb-pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer}
.vb-pill:hover{border-color:var(--border-strong);color:var(--text)}
.vb-pill.view{color:var(--text);font-weight:700}
.vb-dot{width:7px;height:7px;border-radius:50%;background:var(--t10-heat)}
.vb-sep{width:1px;height:18px;background:var(--border)}
.viewbar .spacer{flex:1}

/* viewtabs (HubSpot) */
.viewtabs{display:flex;align-items:flex-end;gap:2px;border-bottom:2px solid var(--border);margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.viewtabs::-webkit-scrollbar{display:none}
.vt{padding:8px 14px;font-size:12.5px;font-weight:650;color:var(--text-2);border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;margin-bottom:-2px;white-space:nowrap}
.vt b{font-weight:650;color:var(--text-3);margin-left:4px;font-variant-numeric:tabular-nums}
.vt:hover{background:var(--surface-2)}
.vt.active{background:var(--surface);border-color:var(--border);border-bottom:2px solid var(--surface);color:var(--text)}
.vt.add{color:var(--accent)}

/* modules (Zoho) */
.module{margin-bottom:18px}
.module-head{display:flex;align-items:center;gap:10px;padding:8px 4px;cursor:pointer}
.module-head .sname{font-size:15px;font-weight:800;letter-spacing:-.01em}
.module-head .scount{font-size:11.5px;color:var(--text-3);font-variant-numeric:tabular-nums}
.module-head .gspacer{flex:1}
.module.collapsed .worksheet{display:none}
.module.collapsed .module-head .chev{transform:rotate(-90deg)}

/* detail rail (Mercury/Mixpanel) */
.detail-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:14px;align-items:start}
.detail-rail{position:sticky;top:64px;max-height:calc(100vh - 130px);overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.rail-head{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.rail-head h3{font-size:14px;font-weight:750;flex:1;line-height:1.3}
.rail-head .eng{width:18px;height:18px;border-radius:5px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;background:var(--t50-bg);color:var(--t50-fg);flex:none}
.rail-stats{display:flex;border:1px solid var(--border);border-radius:8px;margin-top:10px;overflow:hidden}
.rs{flex:1;padding:8px 10px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.rs:last-child{border-right:none}
.rs .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:650}
.rs b{font-size:15px;font-variant-numeric:tabular-nums}
.rs b.up{color:var(--up)}.rs b.down{color:var(--down)}
.rail-hist{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.hist-chip{display:inline-flex;flex-direction:column;align-items:center;font-size:8.5px;color:var(--text-3);border:1px solid var(--border);border-radius:6px;padding:2px 6px;cursor:default}
.hist-chip b{font-size:11px;font-variant-numeric:tabular-nums}
.hist-chip.t3 b{color:var(--t3-fg)}.hist-chip.t10 b{color:var(--t10-fg)}.hist-chip.t20 b{color:var(--t20-fg)}.hist-chip.t50 b{color:var(--t50-fg)}.hist-chip.t100 b{color:var(--t100-fg)}
.hist-chip.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.rail-tabs{display:flex;gap:14px;margin-top:12px;font-size:12px;font-weight:650;color:var(--text-3)}
.rail-tabs .active{color:var(--text);border-bottom:2px solid var(--accent);padding-bottom:6px;margin-bottom:-13px}
.rail-body .serp-row{padding:9px 16px}
tr.kw-row.selected td{background:var(--accent-soft)!important}
.detail-main{min-width:0}

/* v9 Компакт · Attio (слияние «Компакт Про» + Attio) */
.v9{font-size:12.5px}
.v9 .grid tr.sum-row td{height:29px;font-size:11.5px}
.v9 .sum .num{font-family:var(--mono);font-size:11.5px}
.v9 .grid thead th{text-transform:none;letter-spacing:0;font-size:11.5px;font-weight:600}
.v9 .worksheet,.v9 .toolbar,.v9 .summary-table{border-radius:10px}
.v9 .grid tr.group-row td{box-shadow:none}
.v9 .grid tr.kw-row td.kw{box-shadow:none}
.v9 .btn{border-radius:8px}
.v9 .toolbar .f-select{display:none} /* фильтры живут в viewbar */

/* v10 HubSpot */
.v10 .worksheet,.v10 .toolbar,.v10 .summary-table{border-radius:8px}

/* v11 Mercury */
.v11{font-size:12.8px}
.v11 .worksheet{border-radius:10px}

/* v12 Juicebox */
.v12{font-size:13px}
.v12 tr.kw-row:hover td{background:var(--surface-2)}
.v12 .worksheet,.v12 .toolbar,.v12 .summary-table{border-radius:12px}
.v12 .grid thead th{text-transform:none;letter-spacing:0;font-size:11.5px}
.v12 .kw-cell .txt{font-weight:550}

/* v13 Lightfield */
.v13{--row-h:46px}
.v13 .grid thead th{text-transform:none;font-size:11.5px;letter-spacing:0;color:var(--text-3);font-weight:600}
.v13 .worksheet{border:none;box-shadow:none;background:transparent;border-radius:0}
.v13 .toolbar,.v13 .summary-table{border:none;box-shadow:none;background:transparent;border-radius:0}
.v13 .toolbar{padding-left:0;border-bottom:1px solid var(--border)}
.v13 .grid tr.group-row td{background:var(--bg);box-shadow:none;border-top:none;height:52px;padding-left:2px}
.v13 .grid tr.kw-row td.kw{box-shadow:none}
.v13 .grid td.kw{padding-left:2px}
.v13 .grid thead th.kw{padding-left:2px}
.v13 .group-head .gurl{background:transparent;color:var(--text-3);padding-left:0}
.v13 .grid tr.super-row td{border-bottom:none;background:var(--bg);padding-left:2px}
.v13 .grid tr.group-gap td{background:var(--bg)}
.v13 .summary-table td.lastcol{background:transparent;font-weight:700}

/* ============ FLYOUT МОНИТОРИНГОВ (hover по «Позиции») ============ */
.nav-fly{position:relative}
.nav-fly .nav-item{width:100%}
.nav-fly .flyout{position:absolute;left:calc(100% + 4px);top:0;min-width:250px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);padding:6px;display:none;z-index:60}
.nav-fly:hover .flyout,.nav-fly:focus-within .flyout{display:block}
.fly-title{font-size:9.5px;font-weight:750;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);padding:5px 8px 4px}
.fly-item{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:6px;font-size:12.5px;font-weight:550;color:var(--text-2);text-align:left;white-space:nowrap}
.fly-item:hover{background:var(--bg);color:var(--text)}
.fly-item.active{background:var(--accent-soft);color:var(--accent);font-weight:650}
.fly-item .eng{width:15px;height:15px;border-radius:4px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:none}
.fly-more{font-size:11px;color:var(--text-3);padding:6px 8px 4px;border-top:1px solid var(--border);margin-top:4px}

/* ============ v15 — рама-графит (приглушённая, не чёрная) ============ */
.chrome-darkframe{background:#252D39}
.chrome-darkframe .topbar{background:#252D39;border-bottom:1px solid #333D4B}
.chrome-darkframe .logo{color:#EDF1F7}
.chrome-darkframe .gsearch{background:#2E3745;border-color:#3B4655;color:#97A2B4}
.chrome-darkframe .gsearch .kbd{border-color:#465263;color:#8B96A8}
.chrome-darkframe .sidenav{background:#252D39}
.chrome-darkframe .theme-seg{background:#2E3745;border-color:#3B4655}
.chrome-darkframe .ts-btn{color:#7B8698}
.chrome-darkframe .ts-btn:hover{color:#EDF1F7}
.chrome-darkframe .ts-btn.active{background:#465364;color:#fff;box-shadow:none}
.chrome-darkframe .sidenav .nav-item{color:#97A2B4}
.chrome-darkframe .sidenav .nav-item:hover{background:#2E3745;color:#EDF1F7}
.chrome-darkframe .sidenav .nav-item.active{background:rgba(253,33,44,.18);color:#FF8A90}
.chrome-darkframe .main{background:var(--bg);border-radius:14px 0 0 0;margin:0;padding:16px 20px 120px;min-height:calc(100vh - 52px)}
#app.chrome-darkframe{padding-bottom:0}
.page-crumbs{margin-bottom:6px}

/* ============ рама Pipedrive (chrome-pd): тёмно-синий сайдбар с логотипом, белая шапка ============ */
.chrome-pd .sidenav{position:fixed;left:0;top:0;bottom:0;width:68px;height:auto;background:#232150;padding:10px 6px;gap:6px;z-index:55;align-items:stretch}
.chrome-pd .pd-logo{width:34px;height:34px;border-radius:9px;background:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;flex:none}
.chrome-pd .pd-logo svg{width:24px;height:24px;display:block}
.chrome-pd .sidenav .nav-item{color:#A5A3D1;width:100%;padding:8px 2px;border-radius:10px}
.chrome-pd .sidenav .nav-item svg{width:19px;height:19px}
.chrome-pd .sidenav .nav-item:hover{background:#312E63;color:#fff}
.chrome-pd .sidenav .nav-item.active{background:var(--brand);color:#fff}
.chrome-pd .topbar,.chrome-pd .shell{margin-left:68px}
.chrome-pd .gsearch{border-radius:20px;width:360px}
.tb-title{font-size:14px;font-weight:750}
.tb-ico{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);color:var(--text-2);font-size:13px;flex:none}
.tb-ico:hover{color:var(--text);border-color:var(--border-strong)}

/* ============ СВОДКА В ОБЩЕЙ СЕТКЕ ============ */
.grid tr.sum-row td{height:34px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.grid td.sum-label{text-align:left;padding-left:14px;font-weight:600;color:var(--text-2)}
.sum-row .sw{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:7px;vertical-align:1px}
.grid td.sum{text-align:center;padding:0 6px;font-size:12px;white-space:nowrap}
.sum .num{font-weight:650}
.sum .num.total{font-weight:500;color:var(--text-3)}
.sum .pct{color:var(--text-3);font-size:10.5px;margin-left:4px}
.grid tr.sum-row.hero td{background:var(--surface-2);font-weight:700;color:var(--text)}
.grid td.sum.lastcol{background:var(--t100-bg)} /* последний срез: нейтральное выделение */
.grid tr.sum-row.total td{color:var(--text-3)}
.sum-body tr:last-child td{border-bottom:2px solid var(--border-strong)}

/* переключатель вида сводки: абсолютные / проценты */
.sum-mode-seg{display:inline-flex;margin-left:10px;border:1px solid var(--border);border-radius:7px;padding:1.5px;background:var(--bg);vertical-align:-4px;gap:1px}
.sm-mode{font-size:9.5px;font-weight:750;padding:2px 7px;border-radius:5px;color:var(--text-3);line-height:1.3}
.sm-mode:hover{color:var(--text)}
.sm-mode.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.sum-mode-abs .grid td.sum .pct{display:none}
.sum-mode-abs .sum-delta.d-pct{display:none}
.sum-mode-pct .grid td.sum .num{display:none}
.sum-mode-pct .sum-delta.d-abs{display:none}
.sum-mode-pct .grid td.sum .pct{color:var(--text);font-size:12px;font-weight:650;margin-left:0}
.sum-mode-pct tr.sum-row.total .num{display:inline} /* «Всего ключей» без процентов — показываем всегда */

/* ============ ЗАМОРОЖЕННАЯ КОЛОНКА КЛЮЧА (гориз. скролл) ============ */
.grid thead th.kw{position:sticky;left:0;z-index:11}
.grid td.kw{position:sticky;left:0;z-index:2;background:var(--surface)}
.grid td.sum-label{position:sticky;left:0;z-index:2;background:var(--surface)}
.grid tr.sum-row.hero td.sum-label{background:var(--surface-2)}
.super-head{position:sticky;left:14px;width:max-content;max-width:calc(100vw - 220px)}
.group-head{position:sticky;left:24px;width:max-content;max-width:calc(100vw - 220px)}

/* ============ АДАПТИВНОСТЬ СРЕЗОВ: компактный режим ============ */
/* sl-mid: колонки ужимаются, но дельты позиций остаются читаемыми —
   экономим на отступах и дне недели в дате, не на данных */
.sl-mid .grid td.pos{min-width:52px;padding:0 1px}
.sl-mid .cell{gap:3px}
.sl-mid .cells-chip .cell{min-width:0;padding:3px 4px}
.sl-mid .grid thead th.date .dw,.sl-mid .grid thead th.date .dtm{display:none}
.sl-mid .grid thead th.date{padding:9px 2px}
.sl-mid .grid td.sum{padding:0 3px}
.sl-mid .grid td.sum .num{font-size:11.5px}
.sl-mid .sum-delta{font-size:8.5px}
/* маркер смены страницы «⇅»: в углу наезжает на цифру — уводим вниз по центру, там свободно */
.sl-mid.cells-fill .swap{top:auto;bottom:1px;left:50%;transform:translateX(-50%);width:11px;height:11px;font-size:7px}

/* ============ ГОРИЗ. СКРОЛЛ СРЕЗОВ: фикс. левая часть + липкий последний срез ============ */
/* внутри скролл-контейнера вертикальная липкость отсчитывается от контейнера, а не от окна:
   top:52px смещал шапку вниз поверх сводки — в скролл-режиме вертикальные offsets снимаем */
.table-wrap.h-scroll .grid thead th{top:auto}
.table-wrap.h-scroll .grid tr.group-row td{top:auto}
@media (max-width:1199.98px){
  .table-wrap .grid thead th{top:auto}
  .table-wrap .grid tr.group-row td{top:auto}
}
.table-wrap.h-scroll{overflow-x:auto;scrollbar-width:none} /* родной скроллбар скрыт — вместо него плавающий .hsb у низа окна */
.table-wrap.h-scroll::-webkit-scrollbar{display:none}
/* зажатие колонки ключа — отдельный класс: если после него всё влезло, скролл не включается
   и вертикальная липкость шапки сохраняется */
.table-wrap.kw-clamp .grid th.kw,.table-wrap.kw-clamp .grid td.kw{width:240px;min-width:240px;max-width:240px}
.hsb{position:fixed;bottom:0;z-index:60;display:none;overflow-x:auto;overflow-y:hidden;height:14px;background:var(--surface);border-top:1px solid var(--border)}
.hsb.on{display:block}
.hsb > div{height:1px}
.hsb::-webkit-scrollbar{height:13px}
.hsb::-webkit-scrollbar-track{background:var(--surface)}
.hsb::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:7px;border:3px solid var(--surface)}
.hsb::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
.h-scroll .grid thead th:nth-child(2),.h-scroll .grid td.typ{position:sticky;left:240px;background:var(--surface);width:86px;min-width:86px;max-width:86px}
.h-scroll .grid thead th:nth-child(3),.h-scroll .grid td.serp{position:sticky;left:326px;background:var(--surface);width:60px;min-width:60px;max-width:60px}
.h-scroll .grid thead th:nth-child(4),.h-scroll .grid td.freq{position:sticky;left:386px;background:var(--surface);width:90px;min-width:90px}
.h-scroll .grid td.typ,.h-scroll .grid td.serp,.h-scroll .grid td.freq{z-index:2}
.h-scroll .grid thead th:nth-child(-n+4){z-index:11}
.h-scroll .grid thead th.date.last{position:sticky;right:0;z-index:11;background:var(--surface)}
.h-scroll .grid td.pos.last{position:sticky;right:0;z-index:3;background:linear-gradient(var(--t100-bg),var(--t100-bg)) var(--surface)}
.h-scroll .grid td.sum.lastcol{position:sticky;right:0;z-index:3;background:linear-gradient(var(--accent-soft),var(--accent-soft)) var(--surface)}
/* тени на границах прокручиваемой зоны */
.h-scroll.sc-left .grid td.freq,.h-scroll.sc-left .grid thead th:nth-child(4),
.h-scroll.sc-left .grid td.sum-label{box-shadow:10px 0 12px -10px rgba(15,23,42,.35)}
.h-scroll.sc-right .grid td.pos.last,.h-scroll.sc-right .grid thead th.date.last,
.h-scroll.sc-right .grid td.sum.lastcol{box-shadow:-10px 0 12px -10px rgba(15,23,42,.35)}

/* ============ ОГЛАВЛЕНИЕ ГРУПП / СВЕРНУТЬ ВСЁ ============ */
.toc-wrap{position:relative}
.toc-panel{position:absolute;top:calc(100% + 6px);left:0;width:290px;max-height:340px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);padding:8px;display:none;z-index:70}
.toc-wrap.open .toc-panel{display:block}
.toc-panel input{width:100%;border:1px solid var(--border);background:var(--bg);border-radius:7px;padding:6px 9px;font-size:12px;margin-bottom:6px;outline:none;color:var(--text)}
.toc-panel input:focus{border-color:var(--accent)}
.toc-super{font-size:9.5px;font-weight:750;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);padding:7px 6px 3px}
.toc-item{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:6px;font-size:12.5px;color:var(--text-2);text-align:left}
.toc-item:hover{background:var(--bg);color:var(--text)}
.toc-item .tc{color:var(--text-3);font-size:11px;font-variant-numeric:tabular-nums}
.tool-ico{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid var(--border);background:var(--bg);border-radius:7px;color:var(--text-2);font-size:14px;flex:none}
.tool-ico:hover{color:var(--text);border-color:var(--border-strong)}
.tool-ico svg{width:14px;height:14px}
/* ============ ДРОПДАУНЫ ТУЛБАРА И КАЛЕНДАРЬ ПЕРИОДА ============ */
.dd-wrap{position:relative}
.dd-panel{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);padding:6px;display:none;z-index:70;min-width:150px}
.dd-wrap.open > .dd-panel{display:block}
.dd-item{display:flex;align-items:center;gap:6px;width:100%;padding:7px 10px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--text-2);text-align:left;white-space:nowrap}
.dd-item:hover{background:var(--bg);color:var(--text)}
.dd-item.active{color:var(--text);background:var(--accent-soft);font-weight:700}
.dd-item.active::after{content:"✓";margin-left:auto;color:var(--accent);font-size:11px;padding-left:10px}
.cal-pop{width:680px;max-width:94vw;position:fixed;left:50%;top:120px;transform:translateX(-50%);padding:16px}
.cal-months{display:flex;gap:16px;align-items:flex-start}
.cal-nav{align-self:center;font-size:17px;color:var(--text-3);padding:4px 9px;border-radius:6px;flex:none}
.cal-nav:hover{background:var(--bg);color:var(--text)}
.cal-month{flex:1;min-width:0}
.cal-mt{font-size:12.5px;font-weight:700;text-align:center;margin-bottom:7px}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);font-size:9.5px;color:var(--text-3);text-align:center;border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-day{height:25px;font-size:11px;border-radius:6px;color:var(--text-2);font-variant-numeric:tabular-nums;position:relative}
.cal-day:hover{background:var(--bg);color:var(--text)}
.cal-day.other{pointer-events:none}
.cal-day.inr{background:var(--accent-soft);color:var(--text);border-radius:0}
.cal-day.edge{background:var(--accent);color:#fff;border-radius:6px}
.cal-day.has::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:1px;width:4px;height:4px;border-radius:50%;background:var(--t10-heat)}
.cal-day.edge.has::after{background:#fff}
.cal-foot{display:flex;align-items:center;gap:13px;border-top:1px solid var(--border);margin-top:13px;padding-top:13px;flex-wrap:wrap}
.cal-radio{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2);cursor:pointer;white-space:nowrap}
.cal-radio input{accent-color:var(--accent)}
.cal-toggle{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);cursor:pointer;margin-left:auto;white-space:nowrap}
.cal-toggle input{display:none}
.cal-toggle .tgl{width:30px;height:17px;border-radius:10px;background:var(--border-strong);position:relative;transition:background .15s;flex:none}
.cal-toggle .tgl::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .15s}
.cal-toggle input:checked + .tgl{background:var(--accent)}
.cal-toggle input:checked + .tgl::after{left:15px}
.cal-foot .btn.primary{padding:7px 16px}

/* календарик у группы: дата добавления в проект */
.gcount-abs{display:inline-flex;align-items:center;gap:7px}
.gcal{display:inline-flex;color:var(--text-3);cursor:default}
.gcal:hover{color:var(--text-2)}
.gcal svg{width:12px;height:12px}

tr.flash td{animation:rowflash 1.4s ease}
@keyframes rowflash{0%{background:var(--accent-soft)}100%{}}
@media (prefers-reduced-motion: reduce){tr.flash td{animation:none}}

/* время среза в заголовке даты (два съёма в один день) */
.grid thead th.date .dtm{display:block;font-size:9px;color:var(--text-3);font-weight:500;letter-spacing:0}

/* ============ SERP DRAWER ============ */
.drawer-back{position:fixed;inset:0;background:rgba(10,14,20,.45);z-index:90;opacity:0;pointer-events:none;transition:opacity .18s}
.drawer{position:fixed;top:0;right:-460px;width:440px;max-width:92vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:95;box-shadow:var(--shadow-lg);transition:right .2s ease;display:flex;flex-direction:column}
.drawer.open{right:0}
.drawer-back.open{opacity:1;pointer-events:auto}
.drawer-head{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.drawer-head .dh-top{display:flex;align-items:center;gap:8px}
.drawer-head h3{font-size:15px;font-weight:750;flex:1}
.drawer-head .close{color:var(--text-3);font-size:16px;padding:4px 8px;border-radius:6px}
.drawer-head .close:hover{background:var(--bg);color:var(--text)}
.drawer-head .dh-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.drawer-body{flex:1;overflow-y:auto;padding:8px 0}
.serp-row{display:flex;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);align-items:flex-start;position:relative}
.serp-row.our{background:var(--accent-soft);border-left:3px solid var(--accent);padding-left:17px}
.serp-pos{flex:none;width:26px;height:26px;border-radius:6px;color:#fff;font-size:12px;font-weight:750;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.serp-body{min-width:0}
.serp-title{font-size:12.8px;font-weight:600;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.serp-url{font-size:11.5px;color:var(--t3-fg);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.serp-url b{font-weight:650}
.our-tag{display:inline-block;font-size:9.5px;font-weight:750;text-transform:uppercase;letter-spacing:.05em;background:var(--accent);color:#fff;border-radius:4px;padding:1.5px 6px;margin-left:8px;vertical-align:1px}
/* наш сайт на нескольких позициях: чип у первого URL, выпадающий список всех URL */
.our-multi{display:inline-flex;margin-left:7px;vertical-align:-1px}
.om-btn{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:9px;padding:1px 8px;font-size:10px;font-weight:750;white-space:nowrap}
.om-btn:hover{background:var(--accent-soft)}
.om-btn .car{font-size:7px;transition:transform .12s}
.our-multi.open .om-btn .car{transform:rotate(180deg)}
.om-panel{position:absolute;left:30px;right:14px;top:calc(100% - 4px);z-index:30;display:none;flex-direction:column;gap:1px;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow-lg);padding:6px}
.our-multi.open .om-panel{display:flex}
.om-item{display:flex;align-items:center;gap:8px;font-size:11px;padding:4px 7px;border-radius:5px;min-width:0}
.om-item:hover{background:var(--bg)}
.om-pos{flex:none;min-width:17px;text-align:center;font-size:10px;background:var(--t10-bg);color:var(--t10-fg);border-radius:4px;padding:1.5px 4px;font-weight:750}
.om-url{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-2)}

/* ============ SERP MODAL (по центру, мультивыбор дат) ============ */
.serp-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:95;padding:24px;pointer-events:none}
.serp-modal.open{display:flex}
.sm-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);width:auto;min-width:380px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;pointer-events:auto}
.sm-range{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:11.5px;color:var(--text-3);flex-wrap:wrap}
.sm-range input[type="date"]{border:1px solid var(--border);background:var(--bg);border-radius:7px;padding:4px 8px;font-size:11.5px;color:var(--text);font-family:inherit;color-scheme:inherit}
.dchip.arch{border-style:dashed}
.sm-head{padding:14px 18px 10px;border-bottom:1px solid var(--border);flex:none}
.sm-title{display:flex;align-items:center;gap:9px}
.sm-title .eng{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center}
.sm-title h3{font-size:15px;font-weight:750;flex:1;line-height:1.3}
.sm-title .close{color:var(--text-3);font-size:15px;padding:4px 8px;border-radius:6px}
.sm-title .close:hover{background:var(--bg);color:var(--text)}
.sm-dates{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
.dchip{border:1px solid var(--border);background:var(--bg);border-radius:16px;padding:4px 11px;font-size:11.5px;font-weight:650;color:var(--text-2);font-variant-numeric:tabular-nums;white-space:nowrap}
.dchip:hover{border-color:var(--border-strong);color:var(--text)}
.dchip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
/* быстрый выбор «Последние N срезов» в SERP-модалке */
.sm-sep{width:1px;height:18px;background:var(--border);flex:none}

/* уплотнение истории: +17 генерированных срезов между опорными (итого 25) — для проверки адаптивности.
   Ручные данные остаются якорями, промежуточные значения интерполируются с детерминированным шумом */
{
  const INS = ['2025-12-22','2026-01-05','2026-01-19','2026-02-02','2026-02-16',
    '2026-03-23','2026-03-30','2026-04-06','2026-04-13','2026-04-20','2026-04-27',
    '2026-05-12','2026-05-19','2026-05-26','2026-06-12','2026-06-19','2026-06-26'];
  const WD = ['вс','пн','вт','ср','чт','пт','сб'];
  const mk = iso => ({d: iso.slice(8,10)+'.'+iso.slice(5,7), w: WD[new Date(iso+'T00:00:00').getDay()], iso, gen:true});
  const olds = DATES.splice(0, DATES.length);
  const ins = INS.map(mk);
  const map = []; /* старый индекс → новый */
  let p = 0;
  olds.forEach((d, oi)=>{
    while(p < ins.length && ins[p].iso < d.iso) DATES.push(ins[p++]);
    map[oi] = DATES.length; DATES.push(d);
  });
  while(p < ins.length) DATES.push(ins[p++]);

  const hash = s => { let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0)/4294967295; };
  const frac = (a,b,x)=>{ const t=+new Date(x)-+new Date(a), s=+new Date(b)-+new Date(a); return s? t/s : 0; };
  const num = v => typeof v==='number';
  const expand = (vals, tag, jit, lo, hi)=>{
    const out = new Array(DATES.length).fill(null);
    map.forEach((ni,oi)=> out[ni]=vals[oi]);
    for(let i=0;i<DATES.length;i++){
      if(!DATES[i].gen) continue;
      let L=-1,R=-1; /* ближайшие якоря; 'na' (позиция не снята) — прозрачен, null (вне ТОП-100) — блокирует */
      for(let j=i-1;j>=0;j--) if(!DATES[j].gen && out[j]!=='na'){L=j;break;}
      for(let j=i+1;j<DATES.length;j++) if(!DATES[j].gen && out[j]!=='na'){R=j;break;}
      const lv = L>=0?out[L]:null, rv = R>=0?out[R]:null;
      let v;
      if(num(lv)&&num(rv)) v = lv + (rv-lv)*frac(DATES[L].iso, DATES[R].iso, DATES[i].iso);
      else if(L<0 && num(rv)) v = rv;      /* до первого якоря */
      else if(R<0 && num(lv)) v = lv;      /* после последнего */
      else continue;                       /* внутри null-периода (вне ТОП-100) */
      v += (hash(tag+DATES[i].iso)-.5)*2*jit;
      out[i] = Math.min(hi, Math.max(lo, Math.round(v)));
    }
    return out;
  };

  const done = new Set(); /* дубли групп делят одни объекты ключей */
  WORKSHEET.forEach(sg=>sg.groups.forEach(g=>g.keys.forEach(k=>{
    if(done.has(k)) return; done.add(k);
    k.pos = expand(k.pos, k.kw, 3, 1, 100);
    if(k.swap) k.swap = k.swap.map(oi=>map[oi]);
    /* динамика частотности к прошлому месяцу: детерминированная генерация ±14% */
    k.wsd = Math.round((hash('ws:'+k.kw)-.5)*.28*k.ws);
  })));
  SUMMARY.forEach(r=>{

    r.pct  = expand(r.pct,  'pct:'+r.key, 1, 0, 100);

  TOTAL_KEYS.splice(0, TOTAL_KEYS.length, ...expand(TOTAL_KEYS, 'total', 0, 0, 99999));

function isoWeekKey(iso, span){
  const d = new Date(iso+'T00:00:00');
  const onejan = new Date(d.getFullYear(),0,1);
  const week = Math.floor(((d-onejan)/86400000 + onejan.getDay())/7);
  return d.getFullYear()+'-'+Math.floor(week/span);
}
function visibleIdx(){
  let idx = DATES.map((_,i)=>i).filter(i=> DATES[i].iso>=PERIOD.from && DATES[i].iso<=PERIOD.to);
  if(SAMPLING!=='all'){
    const keyFn = SAMPLING==='month' ? i=>DATES[i].iso.slice(0,7)

    const seen = new Set();
    idx = idx.filter(i=>{ const k2=keyFn(i); if(seen.has(k2)) return false; seen.add(k2); return true; });
  }
  if(idx.length>SLICES_N) idx = idx.slice(-SLICES_N);

function spark(vals, w=110, h=26, color='var(--accent)'){
  const min=Math.min(...vals), max=Math.max(...vals), span=(max-min)||1;
  const pts = vals.map((v,i)=>[(i/(vals.length-1))*(w-4)+2, h-3-((v-min)/span)*(h-8)]);
  const line = pts.map(p=>p.join(',')).join(' ');
  const last = pts[pts.length-1];
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" opacity=".85"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.6" fill="${color}"/></svg>`;
}

function delta(vals,i){ /* к предыдущему ПОКАЗАННОМУ срезу */
  const j = prevVis(i);
  if(j<0) return 0;
  const cur=vals[i], prev=vals[j];
  if(typeof cur!=='number'||typeof prev!=='number') return 0;
  return cur-prev;
}
function posDelta(pos,i){ /* улучшение позиции = положительная дельта; сравнение с предыдущим видимым срезом */
  if(typeof pos[i]!=='number') return null;
  for(let j=i-1;j>=0;j--){
    if(!VIS.has(j)) continue;
    if(typeof pos[j]==='number') return pos[j]-pos[i];
  }
  return null;
}
/* категории ключа для вкладок видов: упал/вырос — относительно предыдущего показанного среза */
function keyCats(k){
  const last = k.pos[LASTV];
  const d = posDelta(k.pos, LASTV);
  const cats = [];
  if(d!=null && d<0) cats.push('fell');
  if(d!=null && d>0) cats.push('rose');
  if(typeof last==='number' && last<=10) cats.push('top10');
  if(last==null) cats.push('out');
  return cats;
}

const app = document.getElementById('app');

function trendHtml(diff, invert=false){
  if(!diff) return '<span class="trend" style="color:var(--text-3)">— без изменений</span>';
  const good = invert ? diff<0 : diff>0;
  const cls = good?'up':'down';
  const arrow = diff>0?'▲':'▼';
  return `<span class="trend ${cls}">${arrow} ${Math.abs(diff)} к прошлому срезу</span>`;
}

function renderSummaryTable(){
  const head = DATES.map((d,i)=>`<td class="${i===DATES.length-1?'lastcol':''}" style="color:var(--text-3);font-size:10.5px;font-weight:650;text-transform:uppercase">${d.d} <span style="font-weight:500">${d.w}</span></td>`).join('');
  const rows = SUMMARY.map(r=>{
    const cells = DATES.map((_,i)=>{
      const df = delta(r.vals,i);
      const dh = i>0&&df!==0 ? `<span class="sum-delta ${df>0?'up':'down'}">${df>0?'▲':'▼'}${Math.abs(df)}</span>` : '';
      return `<td class="${i===DATES.length-1?'lastcol':''}"><span class="num">${r.vals[i]}</span><span class="pct">${r.pct[i]} %</span>${dh}</td>`;
    }).join('');
    const sw = r.band?`<span class="sw" style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--${r.band}-heat);margin-right:7px;vertical-align:1px"></span>`:'';
    return `<tr class="${r.hero?'hero':''}"><th>${sw}${r.label}</th>${cells}</tr>`;
  }).join('');
  const totals = DATES.map((_,i)=>`<td class="${i===DATES.length-1?'lastcol':''}" style="color:var(--text-3)">${TOTAL_KEYS[i]}</td>`).join('');
  return `<div class="summary-table"><table>
    <tr><th style="font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em">Сводка · срезы</th>${head}</tr>
    ${rows}
    <tr><th style="color:var(--text-3)">Всего ключей</th>${totals}</tr>
  </table></div>`;
}

function renderSummaryStrip(){

function renderSummaryChart(){
  const vis = SUMMARY[0];
  const W=760, H=168, PL=38, PR=18, PT=20, PB=26;
  const vals = vis.vals;
  const min = Math.min(...vals), max = Math.max(...vals), span = (max-min)||1;
  const x = i => PL + i*((W-PL-PR)/(vals.length-1));
  const y = v => PT + (1-((v-min)/span))*(H-PT-PB);
  const pts = vals.map((v,i)=>[x(i),y(v)]);
  const line = pts.map(p=>p.map(n=>n.toFixed(1)).join(',')).join(' ');
  const area = `M${pts[0][0]},${pts[0][1]} `+pts.slice(1).map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')+` L${pts[pts.length-1][0]},${H-PB+6} L${pts[0][0]},${H-PB+6} Z`;
  const grid = [min, Math.round((min+max)/2), max].map(v=>
    `<line x1="${PL}" y1="${y(v)}" x2="${W-PR}" y2="${y(v)}" stroke="var(--border)" stroke-width="1"/>
     <text x="${PL-6}" y="${y(v)+3}" text-anchor="end" font-size="9.5" fill="var(--text-3)">${v}</text>`).join('');
  const dots = pts.map((p,i)=>{
    const last = i===pts.length-1;
    return `<circle cx="${p[0]}" cy="${p[1]}" r="${last?4:2.6}" fill="${last?'var(--accent)':'var(--surface)'}" stroke="var(--accent)" stroke-width="1.6"/>
      <text x="${p[0]}" y="${p[1]-8}" text-anchor="middle" font-size="9.5" font-weight="${last?'700':'400'}" fill="${last?'var(--text)':'var(--text-3)'}">${vals[i]}</text>
      <text x="${p[0]}" y="${H-8}" text-anchor="middle" font-size="9.5" fill="var(--text-3)">${DATES[i].d}</text>`;
  }).join('');
  const side = SUMMARY.map(r=>{
    const lastI = r.vals.length-1, df = delta(r.vals,lastI);
    const dd = df===0?'<span class="dd flat">0</span>':`<span class="dd ${df>0?'up':'down'}">${df>0?'▲':'▼'}${Math.abs(df)}</span>`;
    const sw = r.band?`<span class="sw" style="background:var(--${r.band}-heat)"></span>`:`<span class="sw" style="background:var(--accent)"></span>`;
    return `<div class="cs-item">${sw}<span class="lbl">${r.label.replace('Ключей в ','')}</span><span class="val">${r.vals[lastI]}</span>${dd}</div>`;
  }).join('');
  return `<div class="summary-chart">
    <div class="chart-pane">
      <div class="chart-title">Общая видимость по срезам</div>
      <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="График общей видимости">
        ${grid}
        <path d="${area}" fill="var(--accent-soft)"/>
        <polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
        ${dots}
      </svg>
    </div>
    <div class="chart-side">${side}</div>
  </div>`;
}

function nowCellHtml(k){
  const nums = k.pos.filter(p=>typeof p==='number');
  if(!nums.length) return '<span style="color:var(--text-3)">—</span>';
  const last = nums[nums.length-1], first = nums[0];
  const d = first-last;
  const b = band(last);
  const dh = d===0 ? '<span class="nd flat">0</span>'
    : `<span class="nd ${d>0?'up':'down'}" title="Изменение за период">${d>0?'▲':'▼'}${Math.abs(d)}</span>`;
  return `<div class="now-cell" title="Текущая позиция, изменение и тренд за период">
    <span class="np" style="color:var(--${b}-fg)">${last}</span>${dh}${spark(nums.map(n=>-n),62,20,`var(--${b}-heat)`)}
  </div>`;
}

function typDots(typ){
  const st = curV && curV.typStyle;
  if(st==='chips'){
    return Object.entries(typ).map(([k,n])=>
      `<span class="typ-chip" style="background:color-mix(in srgb, ${TYP_META[k].color} 16%, transparent);color:${TYP_META[k].color}" title="${TYP_META[k].name}: ${n} в ТОП-10">${TYP_META[k].short} ${n}</span>`).join('');
  }
  if(st==='stack'){
    const total = Object.values(typ).reduce((a,b)=>a+b,0);
    const tip = Object.entries(typ).map(([k,n])=>`${TYP_META[k].name}: ${n}`).join(', ');
    return `<span class="typ-stack" title="${tip}">${Object.entries(typ).map(([k])=>
      `<span class="ts-dot" style="background:${TYP_META[k].color}"></span>`).join('')}<span class="ts-n">${total}</span></span>`;
  }
  return Object.entries(typ).map(([k,n])=>
    `<span class="typ-dot" style="background:${TYP_META[k].color}" title="${TYP_META[k].name}: ${n} в ТОП-10">${n}</span>`
  ).join('');
}
function serpIcons(serp){
  const map = {ads:{t:'Ad',lbl:'Реклама',tip:'Реклама в выдаче'},vid:{t:'▶',lbl:'Видео',tip:'Видео в выдаче'},map:{t:'⌖',lbl:'Карты',tip:'Карты в выдаче'}};
  if(!serp.length) return '<span style="color:var(--text-3)">—</span>';
  if(curV && curV.serpStyle==='chips')
    return serp.map(s=>`<span class="serp-chip" title="${map[s].tip}">${map[s].lbl}</span>`).join('');
  return serp.map(s=>`<span class="serp-ico" title="${map[s].tip}">${map[s].t}</span>`).join('');
}

function cellHtml(k, i, gi, ki){
  const p = k.pos[i];
  if(p==null) return `<span class="cell none" title="Не в ТОП-100">—</span>`;
  if(p==='na') return `<span class="cell na" title="Позиция не снята">н/д</span>`;
  const b = band(p);
  const d = posDelta(k.pos,i);
  const dh = d ? `<span class="d ${d>0?'up':'down'}">${d>0?'+':''}${d}</span>` : '';
  const sw = (k.swap||[]).includes(i) ? `<span class="swap" title="Сменилась релевантная страница">⇅</span>` : '';
  return `<button class="cell ${b}" data-serp="${gi}:${ki}:${i}" title="${DATES[i].d}: позиция ${p}${d?` (${d>0?'+':''}${d})`:''} · открыть ТОП выдачи${(k.swap||[]).includes(i)?' · сменилась релевантная страница':''}">${sw}${p}${dh}</button>`;
}

/* сводка как часть общей сетки: label занимает колонки ключа, даты совпадают с матрицей.
   Режимы отображения: абсолютные значения или проценты (переключатель у «Общей видимости») */
function renderSummaryRows(labelSpan){
  const rows = SUMMARY.map(r=>{
    const cells = DATES.map((_,i)=>{
      if(!VIS.has(i)) return '';
      const j = prevVis(i);
      const dfA = delta(r.vals,i);
      const dhA = j>=0&&dfA!==0 ? `<span class="sum-delta d-abs ${dfA>0?'up':'down'}">${dfA>0?'▲':'▼'}${Math.abs(dfA)}</span>` : '';
      const dfP = j>=0 ? r.pct[i]-r.pct[j] : 0;
      const dhP = j>=0&&dfP!==0 ? `<span class="sum-delta d-pct ${dfP>0?'up':'down'}">${dfP>0?'▲':'▼'}${Math.abs(dfP)}</span>` : '';
      return `<td class="sum ${i===LASTV?'lastcol':''}"><span class="num">${r.vals[i]}</span><span class="pct">${r.pct[i]} %</span>${dhA}${dhP}</td>`;
    }).join('');
    const sw = r.band?`<span class="sw" style="background:var(--${r.band}-heat)"></span>`:'';
    const seg = r.hero ? `<span class="sum-mode-seg" title="Вид сводки: абсолютные значения / проценты"><button class="sm-mode active" data-m="abs">123</button><button class="sm-mode" data-m="pct">%</button></span>` : '';
    return `<tr class="sum-row ${r.hero?'hero':''}"><td class="sum-label" colspan="${labelSpan}">${sw}${r.label}${seg}</td>${cells}</tr>`;
  }).join('');
  const totals = DATES.map((_,i)=> !VIS.has(i)?'':`<td class="sum ${i===LASTV?'lastcol':''}"><span class="num total">${TOTAL_KEYS[i]}</span></td>`).join('');
  return rows + `<tr class="sum-row total"><td class="sum-label" colspan="${labelSpan}">Всего ключей</td>${totals}</tr>`;
}

/* ================= SERP MODAL ================= */
const serpModal = document.getElementById('serpModal');
const smBox = document.getElementById('smBox');
const drawerBack = document.getElementById('drawerBack');
let serpState = null; /* {gi, ki, dates:[индексы выбранных срезов]} */

/* наша позиция для колонки модалки: из матрицы (текущий период) или синтетическая (архив) */
function modalPos(k, md){
  if(md.mi!=null) return k.pos[md.mi];
  const base = k.pos.find(p=>typeof p==='number');
  if(base==null) return null;
  return Math.max(1, base + ((md.seed*3)%7) - 3);
}
/* выдача для конкретного среза: детерминированная перестановка + наш сайт на своей позиции */
function serpForDate(k, md){
  const base = SERP_TOP.filter(r=>!r.our).map(r=>({...r}));
  for(let s=0;s<md.seed;s++){ const i=(s*3)%(base.length-1); const t=base[i]; base[i]=base[i+1]; base[i+1]=t; }
  const our = SERP_TOP.find(r=>r.our);
  const p = modalPos(k, md);
  const list = base.slice(0,10);
  if(typeof p==='number' && p<=10){
    list.splice(p-1, 0, {...our});
    /* демо: часть срезов — наш сайт занимает несколько позиций в выдаче */
    if(md.seed % 3 === 1){
      const p2 = Math.min(10, p + 3 + (md.seed % 2));
      list.splice(p2-1, 0, {...our, path:'/blog/sklonyator-minus-slov/', title:'Склонятор минус-слов: просклонять список онлайн'});
    }
  }
  return list.slice(0,10).map((r,i)=>({...r, pos:i+1}));
}

function serpColRows(list){
  const ours = list.filter(r=>r.our);
  return list.map(r=>{
    /* наш сайт на нескольких позициях: у первого URL — чип-стрелка со списком всех */
    const multi = ours.length>1 && r===ours[0] ? `<span class="our-multi">
        <button class="om-btn" title="Наш сайт занимает ${ours.length} позиции в этой выдаче — показать все URL">${ours.length} URL <span class="car">▾</span></button>
        <span class="om-panel">${ours.map(o=>`<span class="om-item"><b class="om-pos">${o.pos}</b><span class="om-url">${o.dom}${o.path}</span></span>`).join('')}</span>
      </span>` : '';
    return `
    <div class="serp-row ${r.our?'our':''}">
      <span class="serp-pos" style="background:${TYP_META[r.typ].color}" title="${TYP_META[r.typ].name}">${r.pos}</span>
      <div class="serp-body">
        <div class="serp-title">${esc(r.title)}${r.our?'<span class="our-tag">наш сайт</span>':''}</div>
        <div class="serp-url"><b>${r.dom}</b>${r.path}${multi}</div>
      </div>
    </div>`;
  }).join('');
}

/* доступные в модалке срезы: диапазон + частота (та же логика, что у периода страницы) */
function sampledModalDates(){
  const r = serpState.range;
  let list = MODAL_DATES.filter(md=> md.iso>=r.from && md.iso<=r.to);
  const s = serpState.sampling||'all';
  if(s!=='all'){
    const keyFn = s==='month' ? md=>md.iso.slice(0,7)
      : s==='2week' ? md=>isoWeekKey(md.iso,2)
      : s==='week' ? md=>isoWeekKey(md.iso,1)
      : md=>md.iso;
    const seen = new Set();
    list = list.filter(md=>{ const k2=keyFn(md); if(seen.has(k2)) return false; seen.add(k2); return true; });
  }
  return list;
}

function renderSerpModal(){
  const {gi,ki,dates,range} = serpState;
  const k = GROUPS[gi].keys[ki];
  /* «Последние N»: N последних доступных срезов (с учётом периода и частоты) одним кликом */
  const lastNIds = n => sampledModalDates().slice(-n).map(md=>md.id);
  const isLastN = n => { const ids = lastNIds(n); return ids.length===dates.length && ids.every(id=>dates.includes(id)); };
  const chips = sampledModalDates().map(md=>
    `<button class="dchip ${dates.includes(md.id)?'active':''} ${md.arch?'arch':''}" data-id="${md.id}">${md.d}${md.t?` ${md.t}`:''}</button>`).join('');
  const cols = MODAL_DATES.filter(md=>dates.includes(md.id)).map(md=>{
    const p = modalPos(k, md); const b = band(p);
    return `<div class="sm-col">
      <div class="sm-col-h"><b>${md.d}</b>${md.t?`<span class="t">${md.t}</span>`:''}<span class="dw2">${md.w}</span>${md.arch?'<span class="t">архив</span>':''}
        <span class="ourpos ${b||'none'}" title="Наша позиция в этом срезе">${p==null?'—':(p==='na'?'н/д':p)}</span></div>
      <div class="sm-list">${serpColRows(serpForDate(k,md))}</div>
    </div>`;
  }).join('');
  smBox.innerHTML = `
    <div class="sm-head">
      <div class="sm-title">
        <span class="eng ya" title="Яндекс">${I.ya}</span>
        <h3>${esc(k.kw)}</h3>
        <button class="close" id="smClose" aria-label="Закрыть">✕</button>
      </div>
      <div class="sm-range">
        <span>Период:</span>
        <span class="dd-wrap" id="smCalWrap">
          <button class="period">${I.cal} ${fmtRu(range.from)} — ${fmtRu(range.to)}</button>
          <div class="dd-panel cal-pop" id="smCalPop"></div>
        </span>
        <span class="sm-sep"></span>
        ${[5,10].map(n=>`<button class="lastn ${isLastN(n)?'active':''}" data-n="${n}" title="Показать ${n} последних срезов">Последние ${n}</button>`).join('')}
        <span class="sm-hint" style="margin:0">расширьте период, чтобы выбрать более старые срезы</span>
      </div>
      <div class="sm-dates">${chips}</div>
    </div>
    <div class="sm-cols">${cols}</div>`;
  document.getElementById('smClose').onclick = closeSerp;
  smBox.querySelectorAll('.om-btn').forEach(b=> b.onclick = e=>{
    e.stopPropagation();
    const w = b.parentElement, was = w.classList.contains('open');
    smBox.querySelectorAll('.our-multi.open').forEach(x=>x.classList.remove('open'));
    if(!was) w.classList.add('open');
  });
  smBox.querySelectorAll('.lastn').forEach(b=> b.onclick = ()=>{
    serpState.dates = lastNIds(+b.dataset.n);
    renderSerpModal();
  });
  smBox.querySelectorAll('.dchip').forEach(c=>{
    c.onclick = ()=>{
      const id = c.dataset.id;
      const idx = serpState.dates.indexOf(id);
      if(idx>=0){ if(serpState.dates.length===1) return; serpState.dates.splice(idx,1); }
      else serpState.dates.push(id);
      renderSerpModal();
    };
  });
  /* календарь диапазона — тот же компонент, что у периода страницы */
  const smCalWrap = document.getElementById('smCalWrap');
  smCalWrap.querySelector('.period').onclick = e=>{
    e.stopPropagation();
    const was = smCalWrap.classList.contains('open');
    document.querySelectorAll('.dd-wrap.open').forEach(x=>x.classList.remove('open'));
    if(!was){
      smCalWrap.classList.add('open');
      openCalFor('modal', serpState.range.from, serpState.range.to, serpState.sampling||'all');
    }
  };
}

function serpListHtml(){
  return SERP_TOP.map(r=>`
    <div class="serp-row ${r.our?'our':''}">
      <span class="serp-pos" style="background:${TYP_META[r.typ].color}" title="${TYP_META[r.typ].name}">${r.pos}</span>
      <div class="serp-body">
        <div class="serp-title">${esc(r.title)}${r.our?'<span class="our-tag">наш сайт</span>':''}</div>
        <div class="serp-url"><b>${r.dom}</b>${r.path}</div>
      </div>
    </div>`).join('');
}

function renderDetail(gi,ki,di){
  const rail = document.getElementById('detailRail');
  if(!rail) return;
  const k = GROUPS[gi].keys[ki];
  const nums = k.pos.filter(p=>typeof p==='number');
  const lastPos = nums.length ? nums[nums.length-1] : null;
  const dPeriod = nums.length ? nums[0]-nums[nums.length-1] : null;
  const hist = DATES.map((d,i)=>{
    const p = k.pos[i]; const b = band(p);
    return `<span class="hist-chip ${b||''} ${i===di?'sel':''}" title="Срез ${d.d}.2026">${d.d}<b>${p==null?'—':(p==='na'?'н/д':p)}</b></span>`;
  }).join('');
  rail.innerHTML = `
    <div class="rail-head">
      <div class="dh-top"><span class="eng" title="Яндекс">Я</span><h3>${esc(k.kw)}</h3></div>
      ${k.relUrl?`<div style="margin-top:6px"><span class="rel-url" style="margin-left:0">≠ ${k.relUrl}</span></div>`:''}
      <div class="rail-stats">
        <div class="rs"><span class="lbl">Позиция</span><b>${lastPos==null?'—':lastPos}</b></div>
        <div class="rs"><span class="lbl">Δ период</span><b class="${dPeriod>0?'up':dPeriod<0?'down':''}">${dPeriod==null?'—':(dPeriod>0?'+':'')+dPeriod}</b></div>
        <div class="rs"><span class="lbl">Частота</span><b>${fmtWs(k.ws)}</b></div>
      </div>
      <div class="rail-hist">${hist}</div>
      <div class="rail-tabs"><span class="active">ТОП-10 · ${DATES[di].d}</span><span>История</span><span>Конкуренты</span></div>
    </div>
    <div class="rail-body">${serpListHtml()}</div>`;
  app.querySelectorAll('.kw-row').forEach(r=>r.classList.toggle('selected', r.dataset.key===`${gi}:${ki}`));
}

function openSerp(gi,ki,di){
  serpState = {gi, ki, dates:['m'+di], range:{from: DATES[0].iso, to: DATES[DATES.length-1].iso}, sampling:'all'};
  renderSerpModal();
  serpModal.classList.add('open'); drawerBack.classList.add('open');
}
function closeSerp(){ serpModal.classList.remove('open'); drawerBack.classList.remove('open'); }
drawerBack.onclick = closeSerp;
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeSerp(); document.querySelectorAll('.toc-wrap.open, .dd-wrap.open, .search-wrap.open, .our-multi.open').forEach(t=>t.classList.remove('open')); }
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); const i=document.getElementById('gsInput'); if(i) i.focus(); }
