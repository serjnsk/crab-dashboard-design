document.addEventListener('click', e=>{

});

/* ================= ГЛОБАЛЬНЫЙ ПОИСК ================= */
function renderGsList(){
  const listEl = document.getElementById('gsList');
  if(!listEl) return;
  const q = (document.getElementById('gsInput').value||'').toLowerCase();
  const items = SEARCH_ITEMS.filter(it=> (GS_TAB==='all'||it.fav) && (it.proj+' '+it.mon).toLowerCase().includes(q));
  listEl.innerHTML = items.length ? items.map(it=>`
    <div class="gs-item">

        <div class="gs-t"><b>${it.proj}</b><span class="gs-sep">›</span>${esc(it.mon)}</div>
        <div class="gs-d">${I.link} ${it.proj}</div>
      </div>

/* ================= КАЛЕНДАРЬ ПЕРИОДА ================= */
let CAL = null; /* target: 'page' — период страницы, 'modal' — диапазон в SERP-модалке */
function openCalFor(target, from, to, sampling){
  CAL = { target, y:+from.slice(0,4), m:+from.slice(5,7)-1,
          from, to, sampling, custom:false, pick:false };
  buildCal();
}
function openCal(){ openCalFor('page', PERIOD.from, PERIOD.to, SAMPLING); }
function calMonthHtml(y,m){
  const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const startDow = (new Date(y,m,1).getDay()+6)%7;
  const dim = new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<startDow;i++) cells += '<span class="cal-day other"></span>';
  for(let d=1;d<=dim;d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = MODAL_DATES.some(md=>md.iso===iso);
    const inr = iso>=CAL.from && iso<=CAL.to;
    const edge = iso===CAL.from || iso===CAL.to;
    cells += `<button class="cal-day ${inr?'inr':''} ${edge?'edge':''} ${has?'has':''}" data-iso="${iso}">${d}</button>`;
  }
  return `<div class="cal-month"><div class="cal-mt">${MN[m]} ${y}</div>
    <div class="cal-wd">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(w=>`<span>${w}</span>`).join('')}</div>
    <div class="cal-grid">${cells}</div></div>`;
}
function buildCal(){
  const pop = document.getElementById(CAL && CAL.target==='modal' ? 'smCalPop' : 'calPop');
  if(!pop || !CAL) return;
  const months = [0,1,2].map(off=>{
    let y=CAL.y, m=CAL.m+off; y+=Math.floor(m/12); m=((m%12)+12)%12;
    return calMonthHtml(y,m);
  }).join('');
  pop.innerHTML = `
    <div class="cal-months"><button class="cal-nav" data-nav="-1">‹</button>${months}<button class="cal-nav" data-nav="1">›</button></div>
    <div class="cal-foot">
      ${[['all','Все'],['day','1/день'],['week','1/неделю'],['2week','2/неделю'],['month','1/месяц']]
        .map(([v2,l])=>`<label class="cal-radio"><input type="radio" name="samp" value="${v2}" ${CAL.sampling===v2?'checked':''}>${l}</label>`).join('')}
      <label class="cal-toggle"><input type="checkbox" id="calCustom" ${CAL.custom?'checked':''}><span class="tgl"></span>Свой выбор дат</label>
      <button class="btn primary" id="calApply">Применить</button>
    </div>`;
  pop.querySelectorAll('.cal-nav').forEach(b=> b.onclick = e=>{ e.stopPropagation(); CAL.m += +b.dataset.nav; buildCal(); });
  pop.querySelectorAll('.cal-day:not(.other)').forEach(d=> d.onclick = e=>{
    e.stopPropagation();
    const iso = d.dataset.iso;
    if(!CAL.pick){ CAL.from = iso; CAL.to = iso; CAL.pick = true; }
    else { if(iso<CAL.from){ CAL.to = CAL.from; CAL.from = iso; } else CAL.to = iso; CAL.pick = false; }
    CAL.custom = true;
    buildCal();
  });
  pop.querySelectorAll('input[name="samp"]').forEach(r=> r.onchange = ()=>{ CAL.sampling = r.value; });
  const cc = document.getElementById('calCustom');
  if(cc) cc.onchange = ()=>{ CAL.custom = cc.checked; };
  document.getElementById('calApply').onclick = e=>{
    e.stopPropagation();
    if(CAL.target==='modal'){
      serpState.range = {from:CAL.from, to:CAL.to};
      serpState.sampling = CAL.sampling;
      const avail = sampledModalDates().map(md=>md.id);
      serpState.dates = serpState.dates.filter(id=>avail.includes(id));
      if(!serpState.dates.length && avail.length) serpState.dates = [avail[avail.length-1]];
      renderSerpModal();
    } else {
      PERIOD = {from:CAL.from, to:CAL.to};
      SAMPLING = CAL.sampling;
      show(cur);
    }
  };
}

/* ================= АДАПТИВНОСТЬ СРЕЗОВ ================= */
/* ширина колонки среза от доступного места: полная → компактная (дельты всегда читаемы)
   → гориз. скролл с компактными ячейками и фикс. левой частью */
function updateScrollShadows(w){
  w.classList.toggle('sc-left', w.scrollLeft > 2);
  w.classList.toggle('sc-right', w.scrollLeft < w.scrollWidth - w.clientWidth - 2);
}
function applySliceDensity(){
  const wraps = [...app.querySelectorAll('.table-wrap')];
  if(!wraps.length) return;
  const FIXED = 492 + (curV && curV.nowCol ? 150 : 0); /* ключ+тип+serp+частотность с дельтой(+сейчас) */
  /* сброс ДО измерений: kw-clamp/h-scroll зажимают колонку ключа и искажают ширину таблицы */
  app.classList.remove('sl-mid');
  wraps.forEach(w=>w.classList.remove('h-scroll','kw-clamp'));
  const per = (wraps[0].clientWidth - FIXED) / (VIS.size || 1);
  if(per < 62) app.classList.add('sl-mid'); /* тесно: компактные колонки; не влезли — дальше сработает скролл */
  /* чтение scrollWidth после смены классов форсирует пересчёт лэйаута — rAF не нужен
     (и не срабатывает в фоновых вкладках) */
  wraps.forEach(w=>{
    let over = w.scrollWidth > w.clientWidth + 1;
    if(over){ /* шаг 1: зажать колонку ключа — часто этого достаточно */
      w.classList.add('kw-clamp');
      over = w.scrollWidth > w.clientWidth + 1;
    }
    w.classList.toggle('h-scroll', over); /* шаг 2: не помогло — скролл-режим */
    if(over){
      if(!w.__sl){ w.__sl = true; w.addEventListener('scroll', ()=>{ updateScrollShadows(w); if(HSB && HSB.__w===w) HSB.scrollLeft = w.scrollLeft; }, {passive:true}); }
      w.scrollLeft = w.scrollWidth; /* старт: последние срезы на виду */
      updateScrollShadows(w);
    }
  });
  /* фактическая высота thead (меняется в плотных режимах и при времени в датах) */
  const theadEl = app.querySelector('.grid thead');
  if(theadEl) app.style.setProperty('--thead-h', Math.round(theadEl.getBoundingClientRect().height)+'px');
  updateHsb();
}

/* плавающий горизонтальный скроллбар: прикреплён к низу окна, пока таблица на экране.
   Родной скроллбар .table-wrap скрыт — иначе он оказывается под всеми строками, в самом низу */
let HSB = null;
function updateHsb(){
  const w = app.querySelector('.table-wrap.h-scroll');
  if(!HSB){
    HSB = document.createElement('div');
    HSB.className = 'hsb';
    HSB.appendChild(document.createElement('div'));
    HSB.addEventListener('scroll', ()=>{ if(HSB.__w) HSB.__w.scrollLeft = HSB.scrollLeft; }, {passive:true});
    document.body.appendChild(HSB);
  }
  HSB.__w = w;
  if(!w || w.scrollWidth <= w.clientWidth + 1){ HSB.classList.remove('on'); return; }
  const r = w.getBoundingClientRect();
  const visible = r.top < innerHeight - 60 && r.bottom > 120;
  HSB.classList.toggle('on', visible);
  if(!visible) return;
  HSB.style.left = r.left + 'px';
  HSB.style.width = r.width + 'px';
  /* когда низ таблицы поднимается в окно — скроллбар «приземляется» на её нижнюю кромку */
  HSB.style.bottom = Math.max(0, innerHeight - r.bottom) + 'px';
  HSB.firstChild.style.width = w.scrollWidth + 'px';
  HSB.scrollLeft = w.scrollLeft;
}
window.addEventListener('scroll', updateHsb, {passive:true});
let __slT;
window.addEventListener('resize', ()=>{ clearTimeout(__slT); __slT = setTimeout(applySliceDensity, 120); });

/* ================= SWITCHER / THEME ================= */
let cur = 0;
let userTheme = null; /* null = auto (или дефолт варианта) */

function effectiveTheme(){
  if(userTheme) return userTheme;
  if(VARIANTS[cur].theme) return VARIANTS[cur].theme;
  return null; /* системная */
}
function applyTheme(){
  const t = effectiveTheme();
  if(t) document.documentElement.setAttribute('data-theme', t);
  else document.documentElement.removeAttribute('data-theme');
  document.querySelectorAll('.ts-btn').forEach(b=> b.classList.toggle('active', (userTheme||'system')===b.dataset.mode));
}

function show(i){
  cur = i;
  const v = VARIANTS[i];
  app.className = `${v.id} cells-${v.cells} dens-${v.dens} sum-${v.summary} sum-mode-abs chrome-${v.chrome||'std'}${v.nowCol?' has-now':''}`;
  app.innerHTML = renderDashboard(v);
  applyTheme();
  applySliceDensity(); /* плотность колонок срезов + h-scroll; внутри же меряется --thead-h */
  /* режим сводки: абсолютные / проценты */
  app.querySelectorAll('.sm-mode').forEach(b=> b.onclick = e=>{
    e.stopPropagation();
    app.classList.remove('sum-mode-abs','sum-mode-pct');
    app.classList.add('sum-mode-'+b.dataset.m);
    app.querySelectorAll('.sm-mode').forEach(x=>x.classList.toggle('active', x===b));
  });
  /* переключатель темы в шапке: системная / светлая / тёмная */
  app.querySelectorAll('.ts-btn').forEach(b=> b.onclick = ()=>{
    userTheme = b.dataset.mode==='system' ? null : b.dataset.mode;
    applyTheme();
  });
  /* collapse groups */
  app.querySelectorAll('.group-row').forEach(gr=>{
    gr.style.cursor='pointer';
    gr.onclick = e=>{
      if(e.target.closest('.gurl')||e.target.closest('.gact')) return;
      gr.classList.toggle('collapsed');
      const gi = gr.dataset.group;
      const on = gr.classList.contains('collapsed');
      app.querySelectorAll(`tr.kw-row[data-parent="${gi}"]`).forEach(r=>r.classList.toggle('g-hide',on));
    };
  });
  /* collapse supergroups */
  app.querySelectorAll('.super-row').forEach(sr=>{
    sr.style.cursor='pointer';
    sr.onclick = ()=>{
      sr.classList.toggle('collapsed');
      const si = sr.dataset.sid;
      const on = sr.classList.contains('collapsed');
      app.querySelectorAll(`tr[data-super="${si}"]`).forEach(r=>r.classList.toggle('s-hide',on));
    };
  });
  /* глобальный поиск */
  const gsWrap = app.querySelector('#searchWrap');
  if(gsWrap){
    const inp = gsWrap.querySelector('#gsInput');
    inp.onfocus = ()=>{ gsWrap.classList.add('open'); renderGsList(); };
    inp.oninput = renderGsList;
    gsWrap.querySelectorAll('.gs-tab').forEach(t=> t.onclick = e=>{
      e.stopPropagation();
      GS_TAB = t.dataset.t;
      gsWrap.querySelectorAll('.gs-tab').forEach(x=>x.classList.toggle('active', x===t));
      renderGsList();
    });
  }
  /* дропдауны тулбара: подсветка, срезы, период */
  app.querySelectorAll('.dd-wrap > .f-select, .dd-wrap > .period').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      const w = btn.parentElement;
      const was = w.classList.contains('open');
      document.querySelectorAll('.dd-wrap.open, .toc-wrap.open').forEach(x=>x.classList.remove('open'));
      if(!was){ w.classList.add('open'); if(w.id==='calWrap') openCal(); }
    };
  });
  app.querySelectorAll('#hlWrap .dd-item').forEach(b=> b.onclick = ()=>{
    const p = HL_PRESETS.find(x=>x.label===b.dataset.hl);
    HL = p.arr; HL_LABEL = p.label;
    show(cur);
  });
  app.querySelectorAll('#slWrap .dd-item').forEach(b=> b.onclick = ()=>{ SLICES_N = +b.dataset.n; show(cur); });
  /* оглавление групп */
  const tocWrap = app.querySelector('.toc-wrap');
  if(tocWrap){
    const searchEl = tocWrap.querySelector('#tocSearch');
    const filterToc = q=>{ tocWrap.querySelectorAll('.toc-item').forEach(it=>{
      it.style.display = it.textContent.toLowerCase().includes(q)?'':'none'; }); };
    tocWrap.querySelector('#tocBtn').onclick = e=>{
      e.stopPropagation();
      tocWrap.classList.toggle('open');
      if(tocWrap.classList.contains('open')){ searchEl.value=''; filterToc(''); searchEl.focus(); }
    };
    searchEl.oninput = e=> filterToc(e.target.value.toLowerCase());
    tocWrap.querySelectorAll('.toc-item').forEach(it=>{
      it.onclick = ()=>{
        const gr = app.querySelector(`tr.group-row[data-group="${it.dataset.goto}"]`);
        if(!gr) return;
        const srow = app.querySelector(`tr.super-row[data-sid="${gr.dataset.super}"]`);
        if(srow && srow.classList.contains('collapsed')) srow.click();
        if(gr.classList.contains('collapsed')) gr.click();
        tocWrap.classList.remove('open');
        gr.scrollIntoView({behavior:'smooth', block:'center'});
        gr.classList.remove('flash'); void gr.offsetWidth; gr.classList.add('flash');
      };
    });
  }
  /* вкладки видов: фильтрация ключей, пустые группы/супергруппы скрываются */
  const applyView = view=>{
    app.querySelectorAll('.vt[data-view]').forEach(t=>t.classList.toggle('active', t.dataset.view===view));
    app.querySelectorAll('tr.kw-row').forEach(r=>{
      const ok = view==='all' || (r.dataset.cats||'').split(' ').includes(view);
      r.classList.toggle('v-hide', !ok);
    });
    app.querySelectorAll('tr.group-row').forEach(gr=>{
      const any = [...app.querySelectorAll(`tr.kw-row[data-parent="${gr.dataset.group}"]`)].some(r=>!r.classList.contains('v-hide'));
      gr.classList.toggle('v-hide', !any);
      const gap = gr.previousElementSibling;
      if(gap && gap.classList.contains('group-gap')) gap.classList.toggle('v-hide', !any);
    });
    app.querySelectorAll('tr.super-row').forEach(sr=>{
      const any = [...app.querySelectorAll(`tr.group-row[data-super="${sr.dataset.sid}"]`)].some(r=>!r.classList.contains('v-hide'));
      sr.classList.toggle('v-hide', !any);
    });
  };
  app.querySelectorAll('.vt[data-view]').forEach(t=> t.onclick = ()=> applyView(t.dataset.view));
  /* правка URL группы по карандашу */
  app.querySelectorAll('.gedit').forEach(b=>{
    b.onclick = e=>{
      e.stopPropagation();
      const t = b.closest('.group-head').querySelector('.gurl-t');
      t.contentEditable = 'true';
      t.focus();
      const sel = getSelection(), r = document.createRange();
      r.selectNodeContents(t); sel.removeAllRanges(); sel.addRange(r);
      t.onblur = ()=>{ t.contentEditable = 'false'; };
      t.onkeydown = ev=>{ if(ev.key==='Enter'){ ev.preventDefault(); t.blur(); } };
    };
  });
  /* тумблеры: свернуть/развернуть все группы и все супергруппы */
  const gBtn = app.querySelector('#foldGroupsBtn'), sBtn = app.querySelector('#foldSupersBtn');
  if(gBtn) gBtn.onclick = ()=>{
    const collapse = !!app.querySelector('tr.group-row:not(.collapsed)');
    app.querySelectorAll('tr.group-row').forEach(gr=>gr.classList.toggle('collapsed', collapse));
    app.querySelectorAll('tr.kw-row').forEach(r=>r.classList.toggle('g-hide', collapse));
  };
  if(sBtn) sBtn.onclick = ()=>{
    const collapse = !!app.querySelector('tr.super-row:not(.collapsed)');
    app.querySelectorAll('tr.super-row').forEach(sr=>sr.classList.toggle('collapsed', collapse));
    app.querySelectorAll('tr[data-super]').forEach(r=>r.classList.toggle('s-hide', collapse));
  };
  /* collapse modules (Zoho-вариант) */
  app.querySelectorAll('.module-head').forEach(mh=>{
    mh.onclick = e=>{
      if(e.target.closest('.gact')) return;
      mh.parentElement.classList.toggle('collapsed');
    };
  });
  /* serp cells: в варианте с панелью — обновляем панель, иначе открываем drawer */
  app.querySelectorAll('.cell[data-serp]').forEach(c=>{
    c.onclick = ()=>{
      const [gi,ki,di] = c.dataset.serp.split(':').map(Number);
      if(v.detail) renderDetail(gi,ki,di); else openSerp(gi,ki,di);
    };
  });
  /* ключ: клик по тексту или иконке копирования — в буфер; иконка ПС — ссылка на поиск */
  app.querySelectorAll('.kw-cell').forEach(cell=>{
    const kw = cell.dataset.kw, btn = cell.querySelector('.kw-copy');
    if(!btn) return;
    const doCopy = e=>{
      e.stopPropagation();
      copyText(kw);
      btn.classList.add('copied'); btn.innerHTML = I.check;
      clearTimeout(btn.__t);
      btn.__t = setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML = I.copy; }, 1200);
    };
    cell.querySelector('.txt').onclick = doCopy;
    btn.onclick = doCopy;
  });
  /* панель деталей: выбор ключа кликом по строке */
  if(v.detail){
    app.querySelectorAll('.kw-row').forEach(r=>{
      r.style.cursor='pointer';
      r.onclick = e=>{
        if(e.target.closest('.cell')||e.target.closest('.rel-url')) return;
        const [g,k] = r.dataset.key.split(':').map(Number);
        renderDetail(g,k,DATES.length-1);
      };
    });
    renderDetail(0,0,DATES.length-1);
  }
  closeSerp();
}

show(0);
